# =============================================================================
# Atlas RAG System - Zentrale Konfiguration
# =============================================================================

# -----------------------------------------------------------------------------
# Server-Konfiguration
# -----------------------------------------------------------------------------
server:
  host: "0.0.0.0"
  port: 8000
  frontend_port: 3000
  workers: 4
  cors_origins:
    - "http://localhost:3000"
    - "http://${HOSTNAME}:3000"
  log_level: "info"

# -----------------------------------------------------------------------------
# Datenbank-Konfiguration (PostgreSQL)
# -----------------------------------------------------------------------------
database:
  host: "postgres"
  port: 5432
  name: "atlas"
  user: "atlas_user"
  password: "${DB_PASSWORD}"
  pool_size: 20
  max_overflow: 10
  echo_sql: false

# -----------------------------------------------------------------------------
# pgvector Konfiguration
# -----------------------------------------------------------------------------
vector:
  dimensions: 1024
  index_type: "ivfflat"
  distance_metric: "cosine"
  ivfflat_lists: 100
  hnsw_m: 16
  hnsw_ef_construction: 64
  probes: 10

# -----------------------------------------------------------------------------
# LLM-Konfiguration (llama.cpp OpenAI-kompatible API)
# -----------------------------------------------------------------------------
llm:
  base_url: "http://llama-cpp:8080"
  model: "Qwen3.5-35B-A3B-UD-IQ3_S.gguf"
  temperature: 0.1
  top_p: 0.9
  top_k: 40
  max_tokens: 65536
  context_window: 65536
  repeat_penalty: 1.1
  timeout: 120
  system_prompt: |
    Du bist Atlas, ein KI-Assistent für interne Firmendokumente.
    Du antwortest ausschließlich basierend auf den bereitgestellten Dokumenten.
    Wenn du etwas nicht in den Dokumenten findest, sage das ehrlich.
    Antworte auf Deutsch, es sei denn, der Benutzer stellt die Frage auf Englisch.
    Zitiere immer die Quellen deiner Antwort.
  enrichment_system_prompt: |
    You are part of an RAG-Workflow and you rephrase the starting query to include only the relevant information from context and the starting query and formulate the resulting query.
  free_chat_system_prompt: |
    Du bist Atlas, ein hilfreicher KI-Assistent. Antworte klar und präzise.
    Antworte auf Deutsch, es sei denn, der Benutzer stellt die Frage auf Englisch.

# -----------------------------------------------------------------------------
# Embedding-Konfiguration (llama.cpp Embedding Server)
# -----------------------------------------------------------------------------
embedding:
  base_url: "http://llama-cpp-embed:8081"
  model: "pplx-embed-context-v1-0.6b-q8_0.gguf"
  batch_size: 32
  max_retries: 3
  timeout: 60

# -----------------------------------------------------------------------------
# Dokument-Verarbeitung (Chunking)
# -----------------------------------------------------------------------------
chunking:
  strategy: "semantic"
  chunk_size: 512
  chunk_overlap: 50
  min_chunk_size: 100
  max_chunk_size: 1024
  separators:
    - "\n\n"
    - "\n"
    - ". "
    - " "

# -----------------------------------------------------------------------------
# Retrieval-Konfiguration
# -----------------------------------------------------------------------------
retrieval:
  top_k: 10
  rerank: true
  rerank_model: "cross-encoder"
  rerank_top_k: 5
  similarity_threshold: 0.3
  hybrid_search: true
  hybrid_alpha: 0.7
  query_enrichment:
    enabled: true

# -----------------------------------------------------------------------------
# Unterstützte Dateiformate
# -----------------------------------------------------------------------------
documents:
  supported_formats:
    - ".pdf"
    - ".docx"
    - ".doc"
    - ".xlsx"
    - ".xls"
    - ".pptx"
    - ".txt"
    - ".md"
    - ".csv"
    - ".html"
    - ".xml"
    - ".json"
  max_file_size_mb: 100
  ocr_enabled: true
  ocr_language: "deu+eng"
  temp_upload_dir: "/tmp/atlas_uploads"

# -----------------------------------------------------------------------------
# Authentifizierung & Autorisierung
# -----------------------------------------------------------------------------
auth:
  secret_key: "${AUTH_SECRET_KEY}"
  algorithm: "HS256"
  access_token_expire_minutes: 480
  refresh_token_expire_days: 30
  min_password_length: 5
  default_admin_username: "admin"
  default_admin_password: "${ADMIN_DEFAULT_PASSWORD}"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/atlas.log"
  max_file_size_mb: 50
  backup_count: 5
  log_queries: false
