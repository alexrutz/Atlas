# =============================================================================
# Atlas RAG System - Central Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# Server Configuration
# -----------------------------------------------------------------------------
server:
  host: "0.0.0.0"
  port: 8000
  frontend_port: 3000
  workers: 4
  cors_origins:
    - "http://localhost:3000"
    - "http://${HOSTNAME}:3000"
  log_level: "info"

# -----------------------------------------------------------------------------
# Database Configuration (PostgreSQL)
# -----------------------------------------------------------------------------
database:
  host: "postgres"
  port: 5432
  name: "atlas"
  user: "atlas_user"
  password: "${DB_PASSWORD}"
  pool_size: 20
  max_overflow: 10
  echo_sql: false

# -----------------------------------------------------------------------------
# pgvector Configuration
# -----------------------------------------------------------------------------
vector:
  dimensions: 4096
  index_type: "ivfflat"
  distance_metric: "cosine"
  ivfflat_lists: 100
  hnsw_m: 16
  hnsw_ef_construction: 64
  probes: 10

# -----------------------------------------------------------------------------
# LLM Configuration (vLLM OpenAI-compatible API)
# Model: Qwen3.5-35B-A3B (Mixture-of-Experts, ~3.5B active parameters)
# -----------------------------------------------------------------------------
llm:
  base_url: "http://vllm-llm:8080"
  model: "Qwen/Qwen3.5-35B-A3B"
  max_tokens: 65536
  context_window: 65536
  timeout: 120
  sampling:
    temperature: 0.7
    top_p: 0.8
    top_k: 20
    min_p: 0.0
    presence_penalty: 1.5
    repetition_penalty: 1.0
  thinking_sampling:
    temperature: 1.0
    top_p: 0.95
    top_k: 20
    min_p: 0.0
    presence_penalty: 1.5
    repetition_penalty: 1.0
  system_prompt: |
    You are Atlas, an AI assistant for internal company documents.
    You answer exclusively based on the provided documents.
    If you cannot find something in the documents, say so honestly.
    Answer in the same language the user asks in.
    Always cite the sources of your answer.
  enrichment_system_prompt: |
    You are part of an RAG-Workflow and you rephrase the starting query to include only the relevant information from context and the starting query and formulate the resulting query.
  free_chat_system_prompt: |
    You are Atlas, a helpful AI assistant. Answer clearly and concisely.
    Answer in the same language the user asks in.

# -----------------------------------------------------------------------------
# Embedding Configuration (vLLM Embedding Server, GPU-accelerated)
# Model: pplx-embed-context-4b (4B parameters, high-quality contextual embeddings)
# -----------------------------------------------------------------------------
embedding:
  base_url: "http://vllm-embed:8081"
  model: "pplx-ai/pplx-embed-context-4b"
  batch_size: 32
  max_retries: 3
  timeout: 60

# -----------------------------------------------------------------------------
# VLM-OCR (Vision-Language Model for layout-aware OCR, GPU-accelerated)
# Model: Qianfan-OCR (Layout-as-thought reasoning for structured text extraction)
# Layout-as-thought: the model first analyzes page structure (headers, tables,
# columns, lists) then extracts text in logical reading order.
# -----------------------------------------------------------------------------
vlm_ocr:
  enabled: true
  base_url: "http://vllm-ocr:8082"
  model: "stepfun-ai/Qianfan-OCR"
  timeout: 120  # GPU inference is much faster than CPU
  max_tokens: 16384
  max_image_size_px: 2048
  dpi: 300
  layout_as_thought: true
  system_prompt: |
    You are a precise document OCR engine with Layout-as-thought reasoning.
    First, analyze the spatial layout of the page: identify columns, headers,
    footers, tables, lists, captions, and reading order.
    Then, extract ALL text faithfully in logical reading order.
    Preserve paragraph breaks and structural hierarchy.
    For tables, render them in markdown table format.
    Output ONLY the extracted document text — no commentary.

# -----------------------------------------------------------------------------
# Docling Pipeline (advanced document parsing & chunking)
# When enabled, replaces legacy parsers with Docling's ML-powered pipeline:
# - Layout analysis model (Heron) for page element detection
# - TableFormer for table structure recognition
# - HybridChunker for token-aware, structure-preserving chunking
# Set enabled: false to fall back to legacy pypdf/python-docx parsers.
# -----------------------------------------------------------------------------
docling:
  enabled: true
  do_ocr: true
  do_table_structure: true
  table_mode: "fast"             # "fast" (default) or "accurate" (slower, better quality)
  use_docling_chunker: true      # Use HybridChunker (false = legacy chunking strategies)
  max_tokens: 512                # Token limit per chunk (aligned to embedding model)
  merge_peers: true              # Merge undersized adjacent chunks with same headings
  tokenizer: ""                  # HuggingFace tokenizer (empty = use embedding model name)
  accelerator_device: "auto"     # "auto", "cuda", "mps", "cpu"

# -----------------------------------------------------------------------------
# Document Processing (Legacy Chunking - used when docling.use_docling_chunker is false)
# -----------------------------------------------------------------------------
chunking:
  strategy: "semantic"
  chunk_size: 512
  chunk_overlap: 50
  min_chunk_size: 100
  max_chunk_size: 1024
  separators:
    - "\n\n"
    - "\n"
    - ". "
    - " "

# -----------------------------------------------------------------------------
# Retrieval Configuration
# -----------------------------------------------------------------------------
retrieval:
  top_k: 10
  rerank: true
  rerank_model: "ms-marco-MiniLM-L-12-v2"
  rerank_top_k: 5
  similarity_threshold: 0.3
  query_enrichment:
    enabled: true

# -----------------------------------------------------------------------------
# Supported File Formats
# -----------------------------------------------------------------------------
documents:
  supported_formats:
    - ".pdf"
    - ".docx"
    - ".doc"
    - ".xlsx"
    - ".xls"
    - ".pptx"
    - ".txt"
    - ".md"
    - ".csv"
    - ".html"
    - ".xml"
    - ".json"
  max_file_size_mb: 100
  ocr_enabled: true
  ocr_language: "deu+eng"
  ocr_backend: "vlm"
  vlm_always: true
  temp_upload_dir: "/tmp/atlas_uploads"

# -----------------------------------------------------------------------------
# Authentication & Authorization
# -----------------------------------------------------------------------------
auth:
  secret_key: "${AUTH_SECRET_KEY}"
  algorithm: "HS256"
  access_token_expire_minutes: 480
  refresh_token_expire_days: 30
  min_password_length: 5
  default_admin_username: "admin"
  default_admin_password: "${ADMIN_DEFAULT_PASSWORD}"

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/atlas.log"
  max_file_size_mb: 50
  backup_count: 5
  log_queries: false
