# =============================================================================
# Atlas RAG System - Zentrale Konfiguration
# =============================================================================
# Diese Datei wird bei jedem Start des Systems eingelesen.
# Alle Modelle, Parameter und Systemeinstellungen werden hier konfiguriert.
# =============================================================================

# -----------------------------------------------------------------------------
# Server-Konfiguration
# -----------------------------------------------------------------------------
server:
  host: "0.0.0.0"                    # Auf allen Netzwerk-Interfaces lauschen
  port: 8000                          # Backend API Port
  frontend_port: 3000                 # Frontend Port
  workers: 4                          # Anzahl der Uvicorn Worker
  cors_origins:                       # Erlaubte Origins für CORS
    - "http://localhost:3000"
    - "http://${HOSTNAME}:3000"       # Automatisch den Hostnamen verwenden
  log_level: "info"                   # debug, info, warning, error, critical

# -----------------------------------------------------------------------------
# Datenbank-Konfiguration (PostgreSQL)
# -----------------------------------------------------------------------------
database:
  host: "localhost"
  port: 5432
  name: "atlas"
  user: "atlas_user"
  password: "${DB_PASSWORD}"          # Aus Umgebungsvariable laden
  pool_size: 20                       # Connection Pool Größe
  max_overflow: 10                    # Maximale zusätzliche Connections
  echo_sql: false                     # SQL-Queries loggen (nur für Debugging)

# -----------------------------------------------------------------------------
# pgvector Konfiguration
# -----------------------------------------------------------------------------
vector:
  dimensions: 1024                    # Dimensionen des Embedding-Modells
  index_type: "ivfflat"              # ivfflat oder hnsw
  distance_metric: "cosine"           # cosine, l2, inner_product
  ivfflat_lists: 100                  # Anzahl der IVFFlat Listen (bei ivfflat)
  hnsw_m: 16                          # HNSW Parameter M (bei hnsw)
  hnsw_ef_construction: 64            # HNSW Build-Parameter (bei hnsw)
  probes: 10                          # Anzahl der zu durchsuchenden Listen

# -----------------------------------------------------------------------------
# LLM-Konfiguration (Lokales Modell via Ollama)
# -----------------------------------------------------------------------------
llm:
  provider: "ollama"                  # ollama oder vllm
  base_url: "http://localhost:11434"  # Ollama API URL
  model: "llama3.1:8b"               # Modellname
  temperature: 0.1                    # Kreativität (0.0 = deterministisch)
  top_p: 0.9                         # Nucleus Sampling
  top_k: 40                          # Top-K Sampling
  max_tokens: 4096                    # Maximale Antwortlänge
  context_window: 8192                # Kontextfenster des Modells
  repeat_penalty: 1.1                 # Wiederholungsstrafe
  num_gpu: 1                          # Anzahl GPUs
  num_threads: 8                      # CPU Threads (falls CPU-Inferenz)
  timeout: 120                        # Timeout in Sekunden
  system_prompt: |
    Du bist Atlas, ein KI-Assistent für interne Firmendokumente.
    Du antwortest ausschließlich basierend auf den bereitgestellten Dokumenten.
    Wenn du etwas nicht in den Dokumenten findest, sage das ehrlich.
    Antworte auf Deutsch, es sei denn, der Benutzer stellt die Frage auf Englisch.
    Zitiere immer die Quellen deiner Antwort.

# -----------------------------------------------------------------------------
# Embedding-Konfiguration
# -----------------------------------------------------------------------------
embedding:
  provider: "ollama"                  # ollama, sentence-transformers oder custom
  base_url: "http://localhost:11434"  # Embedding API URL
  model: "nomic-embed-text"           # Embedding-Modell
  dimensions: 1024                    # Muss mit vector.dimensions übereinstimmen
  batch_size: 32                      # Batch-Größe für Embedding-Berechnung
  max_retries: 3                      # Wiederholungsversuche bei Fehlern
  timeout: 60                         # Timeout in Sekunden

# -----------------------------------------------------------------------------
# Context-Enriched Embedding Konfiguration
# WICHTIG: Ermöglicht das Hinzufügen von Kontextwissen zu Dokumenten
# -----------------------------------------------------------------------------
context_enrichment:
  enabled: true
  # LLM für Kontext-Generierung (kann ein kleineres, schnelleres Modell sein)
  summarization_model: "llama3.1:8b"
  # Maximale Tokens für Kontext-Zusammenfassung
  max_context_tokens: 512
  # Ob automatisch ein Glossar aus dem Dokument extrahiert werden soll
  auto_glossary_extraction: true
  # Ob Chunk-Überschriften/Abschnitte als Kontext hinzugefügt werden sollen
  include_section_headers: true
  # Ob Dokumenten-Metadaten in den Embedding-Text integriert werden sollen
  include_metadata_in_embedding: true
  # Template für kontextangereicherten Embedding-Text
  # Verfügbare Variablen: {document_title}, {collection_name},
  #   {section_header}, {context_description}, {glossary}, {chunk_text}
  embedding_template: |
    Dokument: {document_title}
    Sammlung: {collection_name}
    Abschnitt: {section_header}
    Kontext: {context_description}
    Glossar: {glossary}
    ---
    {chunk_text}

# -----------------------------------------------------------------------------
# Dokument-Verarbeitung (Chunking)
# -----------------------------------------------------------------------------
chunking:
  strategy: "semantic"                # fixed, sentence, semantic, recursive
  chunk_size: 512                     # Ziel-Chunk-Größe in Tokens
  chunk_overlap: 50                   # Überlappung zwischen Chunks in Tokens
  min_chunk_size: 100                 # Minimale Chunk-Größe
  max_chunk_size: 1024                # Maximale Chunk-Größe
  separators:                         # Trennzeichen für rekursives Chunking
    - "\n\n"
    - "\n"
    - ". "
    - " "

# -----------------------------------------------------------------------------
# Retrieval-Konfiguration
# -----------------------------------------------------------------------------
retrieval:
  top_k: 10                          # Anzahl der abgerufenen Chunks
  rerank: true                        # Reranking aktivieren
  rerank_model: "cross-encoder"       # Reranking-Modell
  rerank_top_k: 5                     # Finale Anzahl nach Reranking
  similarity_threshold: 0.3           # Minimale Ähnlichkeit (0.0-1.0)
  hybrid_search: true                 # Kombination aus Vektor + Volltext
  hybrid_alpha: 0.7                   # Gewichtung Vektor vs. Volltext (1.0 = nur Vektor)

# -----------------------------------------------------------------------------
# Unterstützte Dateiformate
# -----------------------------------------------------------------------------
documents:
  supported_formats:
    - ".pdf"
    - ".docx"
    - ".doc"
    - ".xlsx"
    - ".xls"
    - ".pptx"
    - ".txt"
    - ".md"
    - ".csv"
    - ".html"
    - ".xml"
    - ".json"
  max_file_size_mb: 100               # Maximale Dateigröße
  ocr_enabled: true                   # OCR für gescannte PDFs
  ocr_language: "deu+eng"             # OCR-Sprachen (Tesseract-Codes)
  temp_upload_dir: "/tmp/atlas_uploads"

# -----------------------------------------------------------------------------
# Authentifizierung & Autorisierung
# -----------------------------------------------------------------------------
auth:
  secret_key: "${AUTH_SECRET_KEY}"     # JWT Secret Key (Umgebungsvariable)
  algorithm: "HS256"                   # JWT Algorithmus
  access_token_expire_minutes: 480     # Token-Gültigkeit (8 Stunden)
  refresh_token_expire_days: 30        # Refresh-Token-Gültigkeit
  min_password_length: 5              # Minimale Passwortlänge
  default_admin_username: "admin"      # Standard-Admin-Benutzername
  default_admin_password: "${ADMIN_DEFAULT_PASSWORD}" # Nur beim ersten Start

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  level: "INFO"                       # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/atlas.log"              # Log-Datei Pfad
  max_file_size_mb: 50                # Maximale Log-Dateigröße
  backup_count: 5                     # Anzahl der Log-Backups
  log_queries: false                  # Benutzer-Queries loggen (Datenschutz!)
