# =============================================================================
# Atlas RAG System - Docker Compose
# =============================================================================
# Startet alle benötigten Services für das Atlas RAG System
# Verwendung: docker compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL mit pgvector Extension
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD muss gesetzt sein}
    ports:
      - "5432:5432"
    volumes:
      - ../postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_user -d atlas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # Ollama - Lokaler Embedding Server
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: atlas-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ../ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # llama.cpp - Lokaler LLM Server (OpenAI-kompatibel)
  # ---------------------------------------------------------------------------
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: atlas-llama-cpp
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ../models:/models
    command:
      - -m
      - /models/Qwen3.5-35B-A3B-UD-IQ3_S.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - "65536"
      - -ngl
      - "999"
      - --jinja
      - --alias
      - Qwen3.5-35B-A3B-UD-IQ3_S.gguf
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # Atlas Backend (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atlas-backend
    restart: unless-stopped
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?AUTH_SECRET_KEY muss gesetzt sein}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin}
      ATLAS_PROJECT_PATH: /workspace/Atlas
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - upload_data:/tmp/atlas_uploads
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace/Atlas
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      llama-cpp:
        condition: service_healthy
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # Atlas Frontend (React)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atlas-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - atlas-network

volumes:
  upload_data:

networks:
  atlas-network:
    driver: bridge
