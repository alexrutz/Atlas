# =============================================================================
# Atlas RAG System - Docker Compose
# =============================================================================
# Startet alle benötigten Services für das Atlas RAG System
# Verwendung: docker compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL mit pgvector Extension
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD muss gesetzt sein}
    ports:
      - "5432:5432"
    volumes:
      - ../postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_user -d atlas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # llama.cpp - LLM Server (OpenAI-kompatible API)
  # Configure via .env: LLM_MODEL, LLM_CTX_SIZE, LLM_PREDICT
  # ---------------------------------------------------------------------------
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: atlas-llama-cpp
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ../models:/models:ro
    command: >
      --host 0.0.0.0
      --port 8080
      --model /models/${LLM_MODEL}
      --ctx-size ${LLM_CTX_SIZE:-65536}
      --n-predict ${LLM_PREDICT:-65536}
      --n-gpu-layers 99
      --jinja
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # llama.cpp - Embedding Server (text → vectors)
  # Configure via .env: EMBED_MODEL, EMBED_CTX_SIZE
  # ---------------------------------------------------------------------------
  llama-cpp-embed:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: atlas-llama-cpp-embed
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ../models:/models:ro
    command: >
      --host 0.0.0.0
      --port 8081
      --model /models/${EMBED_MODEL}
      --ctx-size ${EMBED_CTX_SIZE:-32768}
      --batch-size ${EMBED_CTX_SIZE:-32768}
      --ubatch-size ${EMBED_CTX_SIZE:-32768}
      --n-gpu-layers 99
      --embedding
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # llama.cpp - VLM OCR Server (images → structured text)
  # Configure via .env: VLM_MODEL, VLM_CTX_SIZE, VLM_EXTRA_ARGS
  # Available VLM models (GGUF files must be in ../models):
  #   Qianfan-OCR-Q8_0.gguf      (4B, Layout-as-thought, + mmproj-Qianfan-OCR-Q8_0.gguf)
  #   GLM-OCR-Q8_0.gguf          (0.9B, + mmproj-GLM-OCR-Q8_0.gguf)
  #   PaddleOCR-VL-1.5-Q8_0.gguf (0.5B, + PaddleOCR-VL-1.5-mmproj.gguf)
  # ---------------------------------------------------------------------------
  llama-cpp-vlm:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: atlas-llama-cpp-vlm
    restart: unless-stopped
    ports:
      - "8082:8082"
    volumes:
      - ../models:/models:ro
    command: >
      --host 0.0.0.0
      --port 8082
      --model /models/${VLM_MODEL}
      --ctx-size ${VLM_CTX_SIZE:-32768}
      --n-gpu-layers 99
      ${VLM_EXTRA_ARGS}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # Atlas Backend (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atlas-backend
    restart: unless-stopped
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?AUTH_SECRET_KEY muss gesetzt sein}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - upload_data:/tmp/atlas_uploads
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      llama-cpp:
        condition: service_healthy
      llama-cpp-embed:
        condition: service_healthy
      llama-cpp-vlm:
        condition: service_healthy
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # LLM Diagnostic Viewer (tails diagnostic log with colored output)
  # ---------------------------------------------------------------------------
  llm-diagnostic:
    image: alpine:3.20
    container_name: atlas-llm-diagnostic
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for diagnostic log file..."
        while [ ! -f /logs/llm_diagnostic.log ]; do sleep 1; done
        echo "Tailing LLM diagnostic log..."
        tail -f /logs/llm_diagnostic.log
    volumes:
      - ./logs:/logs:ro
    depends_on:
      - backend
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # Atlas Frontend (React)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atlas-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - atlas-network

volumes:
  upload_data:

networks:
  atlas-network:
    driver: bridge
