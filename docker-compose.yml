# =============================================================================
# Atlas RAG System - Docker Compose
# =============================================================================
# Starts all required services for the Atlas RAG system.
# All inference services run on vLLM with GPU acceleration.
# Usage: docker compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector extension
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "5432:5432"
    volumes:
      - ../postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_user -d atlas"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # vLLM - LLM Server (OpenAI-compatible API, GPU)
  # Model: Qwen3.5-35B-A3B (MoE, ~3.5B active parameters)
  # Configure via .env: LLM_MODEL, LLM_MAX_MODEL_LEN, LLM_GPU_UTIL
  # ---------------------------------------------------------------------------
  vllm-llm:
    image: vllm/vllm-openai:latest
    container_name: atlas-vllm-llm
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ../models:/models
    environment:
      - HF_HOME=/models/huggingface
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
    command: >
      --model ${LLM_MODEL:-Qwen/Qwen3.5-35B-A3B}
      --port 8080
      --max-model-len ${LLM_MAX_MODEL_LEN:-65536}
      --gpu-memory-utilization ${LLM_GPU_UTIL:-0.55}
      --enable-reasoning
      --reasoning-parser deepseek_r1
      --trust-remote-code
      --dtype auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # vLLM - Embedding Server (GPU-accelerated)
  # Model: pplx-embed-context-4b (4B parameters)
  # Configure via .env: EMBED_MODEL, EMBED_GPU_UTIL
  # ---------------------------------------------------------------------------
  vllm-embed:
    image: vllm/vllm-openai:latest
    container_name: atlas-vllm-embed
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ../models:/models
    environment:
      - HF_HOME=/models/huggingface
    command: >
      --model ${EMBED_MODEL:-pplx-ai/pplx-embed-context-4b}
      --port 8081
      --task embed
      --gpu-memory-utilization ${EMBED_GPU_UTIL:-0.20}
      --max-model-len ${EMBED_MAX_MODEL_LEN:-32768}
      --trust-remote-code
      --dtype auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # Docling API (document parsing & chunking)
  # ML-powered layout analysis, table structure recognition, HybridChunker.
  # Supports: PDF, DOCX, XLSX, PPTX, HTML, XML, CSV, MD, images
  # Configure via .env: DOCLING_* variables
  # ---------------------------------------------------------------------------
  docling-api:
    build:
      context: ./docling-api
      dockerfile: Dockerfile
    container_name: atlas-docling-api
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - DOCLING_DO_OCR=${DOCLING_DO_OCR:-true}
      - DOCLING_OCR_BACKEND=${DOCLING_OCR_BACKEND:-auto}
      - DOCLING_OCR_LANG=${DOCLING_OCR_LANG:-}
      - DOCLING_DO_TABLE_STRUCTURE=${DOCLING_DO_TABLE_STRUCTURE:-true}
      - DOCLING_TABLE_MODE=${DOCLING_TABLE_MODE:-fast}
      - DOCLING_DO_CODE_ENRICHMENT=${DOCLING_DO_CODE_ENRICHMENT:-true}
      - DOCLING_ACCELERATOR_DEVICE=${DOCLING_ACCELERATOR_DEVICE:-auto}
      - DOCLING_FLASH_ATTENTION=${DOCLING_FLASH_ATTENTION:-false}
      - DOCLING_OCR_BATCH_SIZE=${DOCLING_OCR_BATCH_SIZE:-4}
      - DOCLING_LAYOUT_BATCH_SIZE=${DOCLING_LAYOUT_BATCH_SIZE:-4}
      - DOCLING_TABLE_BATCH_SIZE=${DOCLING_TABLE_BATCH_SIZE:-4}
      - DOCLING_DOCUMENT_TIMEOUT=${DOCLING_DOCUMENT_TIMEOUT:-300}
      - DOCLING_IMAGES_SCALE=${DOCLING_IMAGES_SCALE:-2.0}
      - DOCLING_GENERATE_PICTURES=${DOCLING_GENERATE_PICTURES:-false}
      - DOCLING_WARMUP=${DOCLING_WARMUP:-true}
      - DOCLING_DEFAULT_TOKENIZER=${DOCLING_DEFAULT_TOKENIZER:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # Atlas Backend (FastAPI)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atlas-backend
    restart: unless-stopped
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?AUTH_SECRET_KEY must be set}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - upload_data:/tmp/atlas_uploads
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      vllm-llm:
        condition: service_healthy
      vllm-embed:
        condition: service_healthy
      docling-api:
        condition: service_healthy
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # LLM Diagnostic Viewer (tails diagnostic log with colored output)
  # ---------------------------------------------------------------------------
  llm-diagnostic:
    image: alpine:3.20
    container_name: atlas-llm-diagnostic
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for diagnostic log file..."
        while [ ! -f /logs/llm_diagnostic.log ]; do sleep 1; done
        echo "Tailing LLM diagnostic log..."
        tail -f /logs/llm_diagnostic.log
    volumes:
      - ./logs:/logs:ro
    depends_on:
      - backend
    networks:
      - atlas-network

  # ---------------------------------------------------------------------------
  # Atlas Frontend (React)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atlas-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - atlas-network

volumes:
  upload_data:

networks:
  atlas-network:
    driver: bridge
